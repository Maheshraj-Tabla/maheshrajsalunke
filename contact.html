<form id="feedbackForm" class="contact-form" action="https://formsubmit.co/your-email" method="POST" novalidate>
    <input type="hidden" name="_subject" value="New message">
    
    <div class="form-row">
        <div class="form-group">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>
        </div>
        <div class="form-group">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
        </div>
    </div>

    <div class="form-group">
        <label for="message">Message:</label>
        <textarea id="message" name="message" rows="3" required></textarea>
    </div>

    <button type="submit">Send</button>
</form>
        </section>
    </main>

    <script>
      (function() {
        const params = new URLSearchParams(window.location.search);
        const statusEl = document.getElementById('form-status');
        if (params.get('success') === '1') {
          if (statusEl) statusEl.textContent = 'Thank you! Your message has been sent.';
          // Clean URL so the message doesn't persist on refresh
          if (history.replaceState) {
            history.replaceState({}, document.title, window.location.pathname);
          }
        }
      })();
    </script>
